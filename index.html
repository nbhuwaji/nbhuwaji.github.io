<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neeta Bhuwaji - Portfolio</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root{
            --accent: #2f7dd1;
            --icon-color: #1a1a1a;
            --icon-hover-bg: #f0f0f0;
            --toolbar-bg: #ffffff;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        button { font-family: inherit; }
        .icon { width: 18px; height: 18px; stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; display: block; }

        .sidebar {
            width: 12vw;
            min-width: 160px;
            max-width: 220px;
            background: #f9c896;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2vw 1.5vw;
            z-index: 100;
            transition: transform 0.3s ease;
        }

        :fullscreen .sidebar { transform: translateX(-100%); }

        .sidebar-top h1 {
            font-size: clamp(16px, 1.4vw, 22px);
            font-weight: 700;
            color: #000;
            line-height: 1.1;
            letter-spacing: -0.5px;
        }

        .sidebar-bottom {
            font-size: clamp(10px, 0.75vw, 12px);
            color: #000;
            line-height: 1.4;
            word-break: break-word;
        }

        .main-content {
            margin-left: clamp(160px, 12vw, 220px);
            width: calc(100% - clamp(160px, 12vw, 220px));
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 10px;
            transition: margin 0.3s ease, width 0.3s ease;
            /* FIX 5: allow scroll when zoomed in */
            overflow: auto;
        }

        :fullscreen .main-content { margin-left: 0; width: 100%; }

        .flipbook-wrapper {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        .zoom-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease;
            /* FIX 5: anchor zoom to top so toolbar stays clear */
            transform-origin: center top;
        }

        #flipbook { margin: 0 auto; box-shadow: 0 0 40px rgba(0,0,0,0.15); }
        #flipbook .page { background: white; display: flex; align-items: center; justify-content: center; }
        #flipbook .page img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .close-box {
            position: fixed;
            top: 1.4vw;
            left: calc(clamp(160px, 12vw, 220px) + 1.4vw);
            width: 30px;
            height: 30px;
            background: #ececec;
            border: none;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
            cursor: pointer;
            z-index: 105;
            transition: background 0.15s ease;
        }
        .close-box:hover { background: #ddd; }

        .close-plain {
            position: fixed;
            top: 1.6vw;
            right: 1.6vw;
            width: 28px;
            height: 28px;
            background: transparent;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            cursor: pointer;
            z-index: 105;
        }
        .close-plain:hover { opacity: 0.6; }

        :fullscreen .close-box, :fullscreen .close-plain { display: none; }

        .nav-arrow {
            position: fixed;
            top: 0;
            height: 100vh;
            width: 64px;
            border: none;
            background: transparent;
            color: #444;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 90;
            transition: color 0.15s ease, opacity 0.15s ease;
        }
        .nav-arrow .icon { width: 26px; height: 26px; stroke-width: 1.6; }
        .nav-arrow:hover { color: #000; }
        .nav-arrow:disabled { opacity: 0.25; cursor: default; }
        .nav-arrow.prev { left: clamp(160px, 12vw, 220px); }
        .nav-arrow.next { right: 0; }
        :fullscreen .nav-arrow.prev { left: 0; }

        .bottom-toolbar {
            position: fixed;
            bottom: 2vw;
            left: 50%;
            transform: translateX(-50%);
            background: var(--toolbar-bg);
            border-radius: 24px;
            box-shadow: 0 4px 18px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            padding: 6px 8px;
            gap: 2px;
            z-index: 101;
        }
        .tb-btn {
            border: none;
            background: transparent;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--icon-color);
            transition: background 0.15s ease;
            position: relative;
        }
        .tb-btn:hover:not(:disabled) { background: var(--icon-hover-bg); }
        .tb-btn:disabled { opacity: 0.3; cursor: default; }
        .tb-btn.tb-active { color: var(--accent); background: #eaf2fc; }

        .page-pill {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            font-weight: 600;
            color: var(--icon-color);
            padding: 0 8px;
            white-space: nowrap;
        }
        .page-pill input {
            width: 28px;
            border: none;
            border-bottom: 1.5px solid #ccc;
            text-align: center;
            font-size: 12px;
            font-weight: 600;
            font-family: inherit;
            color: var(--icon-color);
            background: transparent;
        }
        .page-pill input:focus { outline: none; border-bottom-color: var(--accent); }
        .page-pill .total { color: #888; }

        .tb-divider { width: 1px; height: 22px; background: #e2e2e2; margin: 0 4px; }

        @media (max-width: 900px) {
            body { flex-direction: column; overflow-y: auto; }
            .sidebar { width: 100%; max-width: 100%; height: auto; position: relative; flex-direction: row; padding: 15px; }
            .main-content { margin-left: 0; width: 100%; height: auto; min-height: 80vh; }
            .nav-arrow { width: 40px; }
            .nav-arrow.prev { left: 0; }
            .close-box { left: 12px; top: 12px; }
            .close-plain { top: 12px; right: 12px; }
            .bottom-toolbar { padding: 5px 4px; bottom: 10px; }
            .tb-btn { width: 32px; height: 32px; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-top">
            <h1>Neeta Bhuwaji</h1>
        </div>
        <div class="sidebar-bottom">
            kbhuwajic@gmail.com<br>
            <!-- FIX 7: phone number rendered via JS to avoid bot scraping -->
            <span id="phone"></span>
        </div>
    </div>

    <button class="close-box" id="close-box" title="Close">
        <svg class="icon" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
    <button class="close-plain" id="close-plain" title="Close">
        <svg class="icon" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>

    <button class="nav-arrow prev" id="prev-arrow" title="Previous page">
        <svg class="icon" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <button class="nav-arrow next" id="next-arrow" title="Next page">
        <svg class="icon" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
    </button>

    <div class="main-content">
        <div class="loading-screen" id="loading-screen" style="text-align: center;">
            <div style="border: 3px solid rgba(0,0,0,0.1); border-top: 3px solid #000; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 15px;"></div>
            <style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>
            <div style="font-size: 12px; letter-spacing: 1px;">LOADING...</div>
        </div>

        <div class="flipbook-wrapper" id="flipbook-wrapper">
            <div class="zoom-wrapper" id="zoom-wrapper">
                <div id="flipbook"></div>
            </div>
        </div>
    </div>

    <!-- BOTTOM TOOLBAR -->
    <div class="bottom-toolbar">
        <button class="tb-btn" id="tb-prev" title="Previous">
            <svg class="icon" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
        </button>

        <div class="page-pill">
            <!-- FIX 2: added max attribute so browser validation hints work -->
            <input type="number" id="page-input" min="1" max="36" value="1">
            <span>/</span>
            <span class="total" id="total-pages">36</span>
        </div>

        <button class="tb-btn" id="tb-next" title="Next">
            <svg class="icon" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
        </button>

        <div class="tb-divider"></div>

        <button class="tb-btn" id="tb-zoom-in" title="Zoom in">
            <svg class="icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
        </button>
        <button class="tb-btn" id="tb-zoom-out" title="Zoom out">
            <svg class="icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
        </button>

        <div class="tb-divider"></div>

        <button class="tb-btn" id="tb-fullscreen" title="Fullscreen">
            <svg class="icon" viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></svg>
        </button>
    </div>

    <script>
        const TOTAL_PAGES = 36;
        const ASPECT_RATIO = 0.583;
        let zoomLevel = 1;

        document.getElementById('total-pages').textContent = TOTAL_PAGES;

        // FIX 7: render phone number via JS to deter bot scraping
        document.getElementById('phone').textContent = ['+520', '7198954'].join('-');

        function pageSrc(i) {
            return `pages/pages_${String(i).padStart(2, '0')}.jpg`;
        }

        function sidebarWidth() {
            if (window.innerWidth <= 900) return 0;
            return Math.max(160, Math.min(window.innerWidth * 0.12, 220));
        }

        function calculateSize() {
            let availableWidth = window.innerWidth - sidebarWidth();
            let availableHeight = window.innerHeight;

            if (window.innerWidth > 900) availableWidth -= 120;
            availableHeight -= 130;

            let width = Math.min(availableWidth * 0.92, 1400);
            let height = width * ASPECT_RATIO;

            if (height > availableHeight) {
                height = availableHeight;
                width = height / ASPECT_RATIO;
            }
            return { width, height };
        }

        function goToPage(page) {
            if ($('#flipbook').turn('is')) {
                $('#flipbook').turn('page', page);
            }
        }

        // FIX 4: in double-page mode turn.js reports the left page number,
        // so the last spread fires "turned" with page 35, not 36.
        // Disable "next" once we reach TOTAL_PAGES - 1.
        function updatePage(page) {
            document.getElementById('page-input').value = page;

            const atStart = page <= 1;
            const atEnd = page >= TOTAL_PAGES - 1;

            ['prev-arrow', 'tb-prev'].forEach(id =>
                document.getElementById(id).disabled = atStart);
            ['next-arrow', 'tb-next'].forEach(id =>
                document.getElementById(id).disabled = atEnd);
        }

        function applyZoom() {
            document.getElementById('zoom-wrapper').style.transform = `scale(${zoomLevel})`;
        }

        function initPortfolio() {
            const flipbook = document.getElementById('flipbook');
            for (let i = 1; i <= TOTAL_PAGES; i++) {
                const pageDiv = document.createElement('div');
                pageDiv.className = 'page';
                const img = document.createElement('img');
                img.src = pageSrc(i);
                pageDiv.appendChild(img);
                flipbook.appendChild(pageDiv);
            }

            const size = calculateSize();

            setTimeout(function() {
                $('#flipbook').turn({
                    width: size.width,
                    height: size.height,
                    autoCenter: true,
                    display: 'double',
                    acceleration: true,
                    elevation: 50,
                    duration: 1000
                }).bind('turned', function(e, page) {
                    updatePage(page);
                });

                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('flipbook-wrapper').style.display = 'flex';
                updatePage(1);
            }, 500);
        }

        function handleResize() {
            const size = calculateSize();
            if ($('#flipbook').turn('is')) {
                $('#flipbook').turn('size', size.width, size.height);
            }
        }

        window.addEventListener('load', initPortfolio);

        // FIX 6: debounce resize handler to prevent excessive reflows
        let resizeTimer;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(handleResize, 150);
        });

        // prev / next
        document.getElementById('prev-arrow').onclick = () => $('#flipbook').turn('previous');
        document.getElementById('next-arrow').onclick = () => $('#flipbook').turn('next');
        document.getElementById('tb-prev').onclick = () => $('#flipbook').turn('previous');
        document.getElementById('tb-next').onclick = () => $('#flipbook').turn('next');

        const pageInput = document.getElementById('page-input');

        // Keyboard navigation removed intentionally.

        // FIX 2: write the clamped value back to the input immediately so
        // the field self-corrects rather than showing an out-of-range number.
        function commitPageInput() {
            let n = parseInt(pageInput.value, 10);
            if (isNaN(n)) { pageInput.value = 1; return; }
            n = Math.max(1, Math.min(TOTAL_PAGES, n));
            pageInput.value = n;
            goToPage(n);
        }
        pageInput.addEventListener('change', commitPageInput);
        pageInput.addEventListener('blur', commitPageInput);

        // zoom
        document.getElementById('tb-zoom-in').onclick = () => { zoomLevel = Math.min(zoomLevel + 0.15, 2); applyZoom(); };
        document.getElementById('tb-zoom-out').onclick = () => { zoomLevel = Math.max(zoomLevel - 0.15, 0.5); applyZoom(); };

        // fullscreen
        document.getElementById('tb-fullscreen').onclick = function() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        };
        document.addEventListener('fullscreenchange', () => setTimeout(handleResize, 150));

        // FIX 3: close buttons were a no-op outside fullscreen.
        // Now falls back to history.back() in normal mode.
        function handleClose() {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                window.history.back();
            }
        }
        document.getElementById('close-box').onclick = handleClose;
        document.getElementById('close-plain').onclick = handleClose;
    </script>
</body>
</html>
